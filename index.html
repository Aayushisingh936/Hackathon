<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance</title>
    <link rel="stylesheet" href="hackathon.css">
</head>
<body>
    <h1>Student Attendance System</h1>
    
    <div class="box">
        <h2>Login page</h2>
        <br>
        <input type="text" id="myInput" placeholder="Enter your name">
        <br><br>
       <button id="loginBtn">Login</button>
       <br><br>
       <p>Please enter your name and click the Login button to continue.</p>
       </div>

    <div class="container">
        <h2>Dashboard</h2>
        <br><br>
        <h3>Welcome, Students!</h3>
        <br><br>
       <button id="clickBtn">Attendance marking</button>
       <br><br>
       <p><p></p> 
       </div>

    <div class="card">
        <h2>Attendence Marked</h2>
        <br><br>
       <button id="clickBtn">Attendance list</button>
       <br><br>
       <p> </p>
       </div>




</body>
<script src="hackathon.js"></script>
</html>
